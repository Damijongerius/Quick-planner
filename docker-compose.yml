services:
  app:
    build:
      context: ./services/app
      dockerfile: Dockerfile
    container_name: quick-planner-app
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/quickplanner?schema=public
      - AUTH_SECRET=secret
      - AUTH_URL=http://localhost:3000
      - AUTH_TRUST_HOST=true
    depends_on:
      - db
    restart: always

  db:
    image: postgres:16-alpine
    container_name: quick-planner-db
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=quickplanner
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
