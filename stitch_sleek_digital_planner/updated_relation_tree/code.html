<!DOCTYPE html>

                        "headline": ["Manrope"],
                        "body": ["Inter"],

            }

            background-size: 24px 24px;
        }
    </style>

<a class="flex items-center gap-4 px-4 py-3 rounded-lg text-on-surface-variant font-medium hover:bg-surface-container-low transition-colors duration-200" href="#">

<div class="glass-panel rounded-full shadow-lg p-1 border border-white/40 flex">
<button class="px-6 py-2 rounded-full bg-primary text-on-primary text-xs font-bold shadow-sm">Select</button>
<button class="px-6 py-2 rounded-full text-on-surface-variant text-xs font-bold hover:bg-white/50">Connect</button>
<button class="px-6 py-2 rounded-full text-on-surface-variant text-xs font-bold hover:bg-white/50">Inspect</button>
</div>
</div>

<div class="absolute bottom-6 right-6 z-10 flex flex-col gap-2">
<button class="size-12 rounded-2xl glass-panel shadow-md border border-white/40 flex items-center justify-center text-on-surface hover:bg-white transition-all">
<span class="material-symbols-outlined">add</span>
</button>
<button class="size-12 rounded-2xl glass-panel shadow-md border border-white/40 flex items-center justify-center text-on-surface hover:bg-white transition-all">
<span class="material-symbols-outlined">remove</span>
</button>
<button class="size-12 rounded-2xl glass-panel shadow-md border border-white/40 flex items-center justify-center text-on-surface hover:bg-white transition-all">
<span class="material-symbols-outlined">my_location</span>
</button>

<!-- Visualization -->
<div class="flex-1 relative">
<svg class="absolute inset-0 w-full h-full pointer-events-none" xmlns="http://www.w3.org/2000/svg">

<path d="M 300 300 L 700 300" fill="none" opacity="0.4" stroke="#3949AB" stroke-width="2"></path>

<path d="M 700 300 L 700 500" fill="none" opacity="0.3" stroke="#49636f" stroke-dasharray="4 4" stroke-width="1.5"></path>
<path d="M 700 300 L 900 500" fill="none" opacity="0.3" stroke="#49636f" stroke-dasharray="4 4" stroke-width="1.5"></path>

<!-- Node: Legendary -->
<div class="absolute top-[100px] left-[420px]">
<div class="w-40 p-4 rounded-xl bg-surface-container-lowest shadow-md border-l-4 border-primary">

<span class="text-[10px] font-bold text-on-surface uppercase tracking-wider">Legendary</span>
</div>
</div>
</div>
<!-- Node: Epic -->
<div class="absolute top-[280px] left-[220px]">

</div>
</div>
</div>

<div class="absolute top-[280px] left-[620px]">
<div class="w-40 p-4 rounded-xl bg-surface-container-lowest ring-2 ring-primary shadow-xl border-l-4 border-secondary">

<span class="material-symbols-outlined text-secondary text-sm" style="font-variation-settings: 'FILL' 1;">auto_stories</span>
<span class="text-[10px] font-bold text-on-surface uppercase tracking-wider">Story</span>
</div>
</div>
</div>

</div>
</div>

<div class="w-36 p-3 rounded-xl bg-surface-container-lowest shadow-sm border-l-4 border-tertiary opacity-90">

</div>
